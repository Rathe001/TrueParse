name: TOC interface bump

# WoW patches bump the client's interface number; a stale ## Interface
# flags the addon "out of date", and clients with "Load out of date
# AddOns" unchecked (the default) then refuse to LOAD it - a fresh
# install looks simply absent (how v1.2.7 happened). This checks
# Blizzard's current versions daily and commits the bump; it ships to
# users with the next tagged release.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: p3lim/toc-interface-updater@v4
        with:
          flavor: retail # unsuffixed TrueParse.toc is the retail fallback

      - name: Commit the bump
        run: |
          if git diff --quiet; then
            echo "Interface versions already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- '*.toc'
          git commit -m "Bump TOC interface versions to current client builds"
          git push
