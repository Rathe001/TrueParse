# Runs the headless scoring test suite on every push and PR, so the badge
# actually vouches for the code and not just the packaging.
name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update -q && sudo apt-get install -y -q lua5.4

      - name: Syntax-check every addon file
        run: |
          set -e
          find . -name "*.lua" -not -path "./Libs/*" -print0 | xargs -0 -n1 luac5.4 -p

      - name: Run test suite
        run: lua5.4 tests/run.lua
