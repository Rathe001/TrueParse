# Refreshes Data/Benchmarks*.lua weekly from Warcraft Logs statistics so the
# spec/gear curves track class tuning. Requires repo secret WCL_API_KEY
# (free V1 key from warcraftlogs.com/profile). Zone ids change each season -
# update the invocations below when a new tier or M+ season starts.
name: Refresh benchmarks

on:
  schedule:
    - cron: "20 9 * * 2" # Tuesdays 09:20 UTC, after reset-ish
  workflow_dispatch:

permissions:
  contents: write # push the refreshed data files

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write API key
        shell: pwsh
        run: Set-Content -Path scripts/wcl-key.local.txt -Value $env:WCL_API_KEY
        env:
          WCL_API_KEY: ${{ secrets.WCL_API_KEY }}

      - name: Fetch retail benchmarks
        shell: pwsh
        run: ./scripts/fetch-benchmarks.ps1

      - name: Fetch MoP Classic benchmarks
        shell: pwsh
        run: |
          ./scripts/fetch-benchmarks.ps1 -GameBase "https://classic.warcraftlogs.com" `
            -RaidZoneIds @(1054, 1046) -DungeonZone 1039 -MinSamples 6 `
            -OutFile "Benchmarks_Mists.lua"

      - name: Commit if changed
        run: |
          rm -f scripts/wcl-key.local.txt
          git config user.name "trueparse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Data/Benchmarks.lua Data/Benchmarks_Mists.lua
          if git diff --cached --quiet; then
            echo "No benchmark changes"
          else
            git commit -m "Weekly benchmark refresh from Warcraft Logs"
            git push
          fi
